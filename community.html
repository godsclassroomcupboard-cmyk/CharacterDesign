<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Community Bank — Aurabot</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Bangers&family=Fredoka+One&family=Permanent+Marker&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{--cosmic:#1A0A3A;--cosmic2:#0A0520;--purple:#7B2FBE;--pink:#FF2D78;--pink2:#FF6EB4;--teal:#00C4B4;--yellow:#FFD700;--yellow2:#FFA500;--green:#00E676;--ink:#1A0A2A;--card:rgba(255,255,255,0.07);--border:rgba(255,255,255,0.15);}
html,body{min-height:100%;font-family:'Nunito',sans-serif;background:var(--cosmic2);color:#fff;overflow-x:hidden;}

/* ── BG ── */
.cosmic-bg{position:fixed;inset:0;z-index:0;background:radial-gradient(ellipse at 20% 20%,#3A1A6A 0%,#1A0A3A 45%,#0A0520 100%);}
.cosmic-bg::before{content:'';position:absolute;inset:0;background-image:radial-gradient(circle,rgba(255,255,255,0.8) 1px,transparent 1px),radial-gradient(circle,rgba(255,255,255,0.4) 1px,transparent 1px);background-size:180px 180px,120px 120px;background-position:0 0,60px 60px;opacity:0.25;}
.deco{position:fixed;pointer-events:none;font-size:18px;animation:twirl 3s ease-in-out infinite alternate;z-index:0;}
@keyframes twirl{0%{transform:rotate(0deg) scale(1);}100%{transform:rotate(20deg) scale(1.1);}}
.page{position:relative;z-index:1;min-height:100vh;display:flex;flex-direction:column;}

/* ── TOPBAR ── */
.topbar{height:56px;background:rgba(0,0,0,0.5);border-bottom:2px solid rgba(255,215,0,0.3);backdrop-filter:blur(10px);display:flex;align-items:center;gap:12px;padding:0 22px;position:sticky;top:0;z-index:100;}
.back-btn{display:flex;align-items:center;gap:5px;background:rgba(255,255,255,0.1);border:1.5px solid rgba(255,255,255,0.2);border-radius:6px;padding:5px 13px;font-family:'Fredoka One',cursive;font-size:13px;color:#fff;cursor:pointer;text-decoration:none;transition:background 0.15s;}
.back-btn:hover{background:rgba(255,255,255,0.2);}
.topbar-title{font-family:'Bangers',cursive;font-size:22px;letter-spacing:2px;color:#fff;flex:1;}
.topbar-title span{color:var(--yellow);}
.tb-right{display:flex;align-items:center;gap:10px;}
.tb-user{font-family:'Fredoka One',cursive;font-size:13px;color:rgba(255,255,255,0.8);}
.tb-stars{background:rgba(255,215,0,0.15);border:1px solid rgba(255,215,0,0.4);border-radius:99px;padding:4px 12px;font-family:'Bangers',cursive;font-size:14px;color:var(--yellow);letter-spacing:1px;}

/* ── HERO ── */
.hero{background:linear-gradient(135deg,rgba(74,26,138,0.9),rgba(26,10,58,0.7));padding:32px 24px 24px;border-bottom:3px solid rgba(255,215,0,0.2);position:relative;overflow:hidden;}
.hero::after{content:'';position:absolute;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 28px,rgba(255,255,255,0.02) 28px,rgba(255,255,255,0.02) 29px);pointer-events:none;}
.hero-inner{max-width:1100px;margin:0 auto;position:relative;z-index:1;}
.hero-eyebrow{font-family:'Fredoka One',cursive;font-size:11px;letter-spacing:3px;text-transform:uppercase;color:var(--teal);margin-bottom:8px;}
.hero-title{font-family:'Bangers',cursive;font-size:clamp(36px,5vw,60px);letter-spacing:3px;text-transform:uppercase;color:#fff;text-shadow:3px 3px 0 rgba(0,0,0,0.4);margin-bottom:6px;}
.hero-title span{color:var(--yellow);}
.hero-sub{font-family:'Fredoka One',cursive;font-size:14px;color:rgba(255,255,255,0.7);margin-bottom:20px;}

/* Type toggle */
.type-toggle{display:inline-flex;background:rgba(0,0,0,0.3);border-radius:99px;padding:4px;gap:4px;margin-bottom:18px;}
.type-btn{background:transparent;color:rgba(255,255,255,0.7);border:none;border-radius:99px;padding:9px 22px;font-family:'Fredoka One',cursive;font-size:14px;cursor:pointer;transition:all 0.18s;letter-spacing:0.5px;}
.type-btn.active{background:#fff;color:var(--purple);box-shadow:0 2px 12px rgba(0,0,0,0.3);}

/* Class pills */
.class-row{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.class-label{font-family:'Fredoka One',cursive;font-size:12px;color:rgba(255,255,255,0.6);letter-spacing:1px;}
.class-pill{background:rgba(255,255,255,0.1);border:1.5px solid rgba(255,255,255,0.25);color:rgba(255,255,255,0.8);border-radius:99px;padding:6px 16px;font-family:'Fredoka One',cursive;font-size:12px;cursor:pointer;transition:all 0.18s;}
.class-pill:hover{background:rgba(255,255,255,0.2);}
.class-pill.active{background:var(--yellow);color:var(--ink);border-color:var(--yellow);font-weight:800;}

/* ── CONTROLS ── */
.controls{max-width:1100px;margin:0 auto;padding:18px 22px 0;display:flex;gap:10px;align-items:center;flex-wrap:wrap;}
.search-wrap{flex:1;min-width:200px;position:relative;}
.search-wrap svg{position:absolute;left:12px;top:50%;transform:translateY(-50%);}
.search-inp{width:100%;padding:10px 14px 10px 40px;background:rgba(255,255,255,0.08);border:1.5px solid rgba(255,255,255,0.2);border-radius:99px;color:#fff;font-family:'Nunito',sans-serif;font-size:13px;font-weight:700;outline:none;transition:border-color 0.18s;}
.search-inp:focus{border-color:var(--pink);}
.search-inp::placeholder{color:rgba(255,255,255,0.4);}
.sort-btn{padding:8px 16px;background:rgba(255,255,255,0.08);border:1.5px solid rgba(255,255,255,0.2);border-radius:99px;color:rgba(255,255,255,0.7);font-family:'Fredoka One',cursive;font-size:12px;cursor:pointer;transition:all 0.15s;letter-spacing:0.5px;}
.sort-btn.active{background:var(--pink);border-color:var(--pink);color:#fff;}
.sort-btn:hover:not(.active){background:rgba(255,255,255,0.15);}
.results-count{font-family:'Fredoka One',cursive;font-size:12px;color:rgba(255,255,255,0.5);margin-left:auto;}

/* ── GRID ── */
.grid-wrap{max-width:1100px;margin:0 auto;padding:18px 22px 60px;}
.char-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:14px;}

/* ── CARD ── */
.zine-card{background:rgba(255,255,255,0.07);border:2px solid rgba(255,255,255,0.12);border-radius:12px;overflow:hidden;cursor:pointer;transition:all 0.2s;}
.zine-card:hover{transform:translateY(-4px);border-color:var(--pink);box-shadow:0 8px 32px rgba(255,45,120,0.25);}
.card-img{height:160px;background:linear-gradient(135deg,#3A1A6A,#6A2A9A);display:flex;align-items:center;justify-content:center;overflow:hidden;position:relative;}
.card-img img{width:100%;height:100%;object-fit:cover;}
.card-initial{font-family:'Bangers',cursive;font-size:56px;color:rgba(255,255,255,0.2);letter-spacing:2px;}
.card-star-badge{position:absolute;bottom:8px;right:8px;background:rgba(0,0,0,0.65);border:1px solid var(--yellow);border-radius:99px;padding:3px 9px;font-family:'Bangers',cursive;font-size:12px;color:var(--yellow);letter-spacing:1px;}
.card-body{padding:12px 13px 13px;}
.card-name{font-family:'Fredoka One',cursive;font-size:16px;color:#fff;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.card-by{font-size:11px;color:rgba(255,255,255,0.55);font-weight:700;margin-bottom:8px;}
.card-tags{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:8px;}
.card-tag{background:rgba(255,45,120,0.2);border:1px solid rgba(255,45,120,0.3);color:var(--pink2);border-radius:4px;font-size:10px;font-weight:800;padding:2px 7px;}
.star-btn{width:100%;padding:7px;background:rgba(255,255,255,0.06);border:1.5px solid rgba(255,255,255,0.15);border-radius:6px;color:rgba(255,255,255,0.6);font-family:'Fredoka One',cursive;font-size:12px;cursor:pointer;transition:all 0.15s;letter-spacing:0.5px;}
.star-btn:hover{background:rgba(255,215,0,0.15);border-color:var(--yellow);color:var(--yellow);}
.star-btn.starred{background:rgba(255,215,0,0.15);border-color:var(--yellow);color:var(--yellow);}

/* Setting card variant */
.set-card:hover{border-color:var(--teal);box-shadow:0 8px 32px rgba(0,196,180,0.2);}
.set-card .card-tag{background:rgba(0,196,180,0.15);border-color:rgba(0,196,180,0.3);color:var(--teal);}

/* Empty/loading */
.state-box{grid-column:1/-1;text-align:center;padding:60px 20px;color:rgba(255,255,255,0.4);}
.state-box h3{font-family:'Bangers',cursive;font-size:24px;letter-spacing:2px;color:rgba(255,255,255,0.3);margin:14px 0 6px;}
.state-box p{font-family:'Fredoka One',cursive;font-size:13px;}
.spinner{width:32px;height:32px;border:3px solid rgba(255,255,255,0.1);border-top-color:var(--pink);border-radius:50%;animation:spin 0.7s linear infinite;margin:0 auto;}
@keyframes spin{to{transform:rotate(360deg);}}

/* ── MODAL ── */
.modal-bg{display:none;position:fixed;inset:0;z-index:200;background:rgba(10,5,32,0.85);backdrop-filter:blur(6px);align-items:center;justify-content:center;}
.modal-bg.open{display:flex;}
.modal-box{background:#1E0E40;border:2px solid var(--pink);border-radius:14px;width:520px;max-width:96vw;max-height:92vh;overflow-y:auto;box-shadow:0 0 60px rgba(255,45,120,0.25);}
.modal-hdr{background:var(--pink);padding:15px 18px;border-radius:12px 12px 0 0;display:flex;align-items:flex-start;justify-content:space-between;}
.modal-hdr-title{font-family:'Bangers',cursive;font-size:22px;letter-spacing:2px;color:#fff;}
.modal-hdr-sub{font-family:'Fredoka One',cursive;font-size:11px;color:rgba(255,255,255,0.8);margin-top:2px;}
.modal-close{background:none;border:none;cursor:pointer;color:rgba(255,255,255,0.7);font-size:26px;line-height:1;margin-left:10px;}
.modal-img{width:100%;max-height:220px;object-fit:cover;display:block;border-bottom:2px solid rgba(255,255,255,0.1);}
.modal-body{padding:16px 18px 20px;}
.modal-field{display:flex;gap:10px;padding:8px 0;border-bottom:1px solid rgba(255,255,255,0.08);}
.modal-field:last-of-type{border-bottom:none;}
.modal-field-label{font-family:'Fredoka One',cursive;font-size:10px;letter-spacing:1px;text-transform:uppercase;color:rgba(255,255,255,0.4);width:100px;flex-shrink:0;padding-top:2px;}
.modal-field-value{font-size:13px;font-weight:700;color:#fff;flex:1;line-height:1.5;}
.modal-star-btn{margin-top:16px;width:100%;padding:12px;background:rgba(255,215,0,0.15);border:2px solid var(--yellow);border-radius:8px;color:var(--yellow);font-family:'Fredoka One',cursive;font-size:14px;cursor:pointer;transition:all 0.15s;letter-spacing:0.5px;}
.modal-star-btn:hover,.modal-star-btn.starred{background:var(--yellow);color:var(--ink);}
/* Setting modal senses */
.sense-section{margin-bottom:14px;padding-bottom:14px;border-bottom:1px solid rgba(255,255,255,0.08);}
.sense-section:last-child{border-bottom:none;}
.sense-loc-name{font-family:'Fredoka One',cursive;font-size:14px;color:var(--teal);margin-bottom:8px;}

/* Signin bar */
.signin-bar{background:linear-gradient(90deg,var(--purple),var(--pink));color:#fff;text-align:center;padding:10px;font-family:'Fredoka One',cursive;font-size:13px;display:none;}

/* Toast */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(60px);background:#1E0E40;color:#fff;border:1.5px solid var(--yellow);border-radius:99px;padding:10px 22px;font-family:'Fredoka One',cursive;font-size:13px;opacity:0;transition:all 0.3s;pointer-events:none;z-index:9999;white-space:nowrap;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
@media(max-width:600px){.char-grid{grid-template-columns:repeat(auto-fill,minmax(155px,1fr));}}
</style>
</head>
<body>
<div class="cosmic-bg"></div>
<div class="deco" style="left:3%;top:20%;animation-delay:0s;">✦</div>
<div class="deco" style="left:92%;top:15%;animation-delay:0.7s;color:var(--teal);">★</div>
<div class="deco" style="left:50%;top:8%;animation-delay:1.2s;color:var(--pink);font-size:14px;">⭐</div>
<div class="deco" style="left:78%;top:40%;animation-delay:0.4s;color:var(--yellow);font-size:14px;">✦</div>

<div class="page">
<div class="signin-bar" id="signin-bar">Sign in to star items! <a onclick="openSignIn()" style="color:#fff;font-weight:800;cursor:pointer;text-decoration:underline;">Sign in →</a></div>

<header class="topbar">
  <button onclick="history.back()" class="back-btn">← BACK</button>
  <div class="topbar-title">🌟 <span>COMMUNITY</span> BANK</div>
  <div class="tb-right">
    <div id="tb-user" style="display:none;align-items:center;gap:8px;">
      <span class="tb-user" id="tb-name"></span>
      <div class="tb-stars">⭐ <span id="tb-stars">0</span></div>
    </div>
  </div>
</header>

<div class="hero">
  <div class="hero-inner">
    <div class="hero-eyebrow">The Official Aurabot Publication</div>
    <h1 class="hero-title">COMMUNITY <span>BANK</span></h1>
    <p class="hero-sub">Explore characters and settings from everyone in your class — star your favourites!</p>
    <div class="type-toggle">
      <button class="type-btn active" id="type-characters" onclick="setType('characters')">🎭 Characters</button>
      <button class="type-btn" id="type-settings" onclick="setType('settings')">📍 Settings</button>
    </div>
    <div class="class-row">
      <span class="class-label">CLASS:</span>
      <div id="class-pills" style="display:flex;gap:8px;flex-wrap:wrap;">
        <button class="class-pill active" data-class-id="all" onclick="selectClass('all',this)">All Classes</button>
      </div>
    </div>
  </div>
</div>

<div class="controls">
  <div class="search-wrap">
    <svg viewBox="0 0 18 18" fill="none" stroke="rgba(255,255,255,0.4)" stroke-width="2" width="15" height="15"><circle cx="7.5" cy="7.5" r="5"/><line x1="11.5" y1="11.5" x2="16" y2="16"/></svg>
    <input class="search-inp" id="search-input" type="text" placeholder="Search by name or author…" oninput="onSearch()"/>
  </div>
  <button class="sort-btn active" id="sort-stars" onclick="setSort('stars')">⭐ Most Starred</button>
  <button class="sort-btn" id="sort-new" onclick="setSort('newest')">🕐 Newest</button>
  <button class="sort-btn" id="sort-az" onclick="setSort('az')">A–Z</button>
  <div class="results-count" id="results-count"></div>
</div>

<div class="grid-wrap">
  <div class="char-grid" id="char-grid">
    <div class="state-box"><div class="spinner"></div></div>
  </div>
</div>
</div>

<!-- Modal -->
<div class="modal-bg" id="char-modal" onclick="handleModalBgClick(event)">
  <div class="modal-box">
    <div class="modal-hdr">
      <div><div class="modal-hdr-title" id="m-name"></div><div class="modal-hdr-sub" id="m-by"></div></div>
      <button class="modal-close" onclick="closeModal()">×</button>
    </div>
    <div id="m-img-wrap" style="display:none;"><img id="m-img" class="modal-img"/></div>
    <div class="modal-body">
      <div id="m-fields"></div>
      <button class="modal-star-btn" id="m-star-btn" onclick="toggleStarModal()">⭐ <span id="m-star-label">Star this</span></button>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
var SUPABASE_URL='https://nwhaliuajvovesnrdfrr.supabase.co';
var SUPABASE_ANON_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im53aGFsaXVhanZvdmVzbnJkZnJyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk5MDUyMzEsImV4cCI6MjA5NTQ4MTIzMX0.cGZ_yqeTyQYyyUAIc1CrV-M6iwN34CtSzjYBF_nG9xE';
window.__aurabot_sb = window.__aurabot_sb || supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
var _sb = window.__aurabot_sb;
var _user=null,_profile=null,_type='characters',_sortBy='stars',_classId='all';
var _allChars=[],_allSettings=[],_starredIds=new Set(),_starredSettingIds=new Set();
var _activeItem=null,_classes=[],_renderedItems=[];

async function init(){
  var s=await _sb.auth.getSession();
  if(s.data.session)await onSignIn(s.data.session.user);
  else document.getElementById('signin-bar').style.display='block';
  _sb.auth.onAuthStateChange(async function(ev,s){if(ev==='SIGNED_IN'&&s)await onSignIn(s.user);});
  await loadClasses();await loadCharacters();
}
async function onSignIn(user){
  _user=user;var r=await _sb.from('profiles').select('*').eq('id',user.id).single();_profile=r.data;
  _starredIds=await getMyStars();_starredSettingIds=await getMySettingStars();updateTopbar();
  document.getElementById('signin-bar').style.display='none';
}
function updateTopbar(){
  if(!_profile)return;
  var el=document.getElementById('tb-user');el.style.display='flex';
  document.getElementById('tb-name').textContent='Welcome, '+(_profile.display_name||_profile.username||'');
  document.getElementById('tb-stars').textContent=_profile.star_points||0;
}
async function getMyStars(){if(!_user)return new Set();var r=await _sb.from('stars').select('character_id').eq('user_id',_user.id);return new Set((r.data||[]).map(function(s){return s.character_id;}));}
async function getMySettingStars(){if(!_user)return new Set();var r=await _sb.from('setting_stars').select('setting_id').eq('user_id',_user.id);return new Set((r.data||[]).map(function(s){return s.setting_id;}));}

async function loadClasses(){
  var r=await _sb.from('classes').select('id,name').order('name');
  if(r.error||!r.data||!r.data.length)return;
  _classes=r.data;
  var pills=document.getElementById('class-pills');
  pills.innerHTML='<button class="class-pill active" data-class-id="all" onclick="selectClass(\'all\',this)">All Classes</button>'
    +r.data.map(function(c){return'<button class="class-pill" data-class-id="'+c.id+'" onclick="selectClass(\''+c.id+'\',this)">'+escHtml(c.name)+'</button>';}).join('');
}
function selectClass(id,btn){
  _classId=id;document.querySelectorAll('.class-pill').forEach(function(p){p.classList.remove('active');});btn.classList.add('active');
  if(_type==='settings')loadSettings();else applyFilters();
}
function setType(type){
  _type=type;
  document.getElementById('type-characters').className='type-btn'+(type==='characters'?' active':'');
  document.getElementById('type-settings').className='type-btn'+(type==='settings'?' active':'');
  document.getElementById('sort-az').style.display=type==='settings'?'none':'';
  if(type==='settings')loadSettings();else applyFilters();
}
function setSort(s){
  _sortBy=s;document.querySelectorAll('.sort-btn').forEach(function(b){b.classList.remove('active');});
  document.getElementById('sort-'+(s==='newest'?'new':s==='az'?'az':'stars')).classList.add('active');
  if(_type==='settings')applySettingFilters();else applyFilters();
}
function onSearch(){if(_type==='settings')applySettingFilters();else applyFilters();}

async function loadCharacters(){
  showLoading();
  var q=_sb.from('characters').select('id,name,appearance,height,build,personality,strengths,fears,interests,features,sketch_url,ai_art_url,star_count,is_public,created_at,user_id').eq('is_public',true);
  if(_classId!=='all'&&_classes.length){
    var m=await _sb.from('class_members').select('user_id').eq('class_id',_classId);
    var ids=(m.data||[]).map(function(x){return x.user_id;});
    if(!ids.length){_allChars=[];applyFilters();return;}
    q=q.in('user_id',ids);
  }
  var r=await q.order('created_at',{ascending:false});
  if(r.error){showError(r.error.message);return;}
  if(!r.data||!r.data.length){_allChars=[];applyFilters();return;}
  var uids=[...new Set(r.data.map(function(c){return c.user_id;}))];
  var pr=await _sb.from('profiles').select('id,display_name,username').in('id',uids);
  var pm={};(pr.data||[]).forEach(function(p){pm[p.id]=p;});
  _allChars=r.data.map(function(c){c.profiles=pm[c.user_id]||null;return c;});
  applyFilters();
}
function applyFilters(){
  var q=document.getElementById('search-input').value.toLowerCase().trim();
  var f=_allChars.filter(function(c){
    if(!q)return true;
    return(c.name||'').toLowerCase().includes(q)||((c.profiles&&(c.profiles.display_name||c.profiles.username))||'').toLowerCase().includes(q);
  });
  if(_sortBy==='stars')f.sort(function(a,b){return(b.star_count||0)-(a.star_count||0);});
  else if(_sortBy==='newest')f.sort(function(a,b){return new Date(b.created_at)-new Date(a.created_at);});
  else f.sort(function(a,b){return(a.name||'').localeCompare(b.name||'');});
  _renderedItems=f;renderChars(f);
  document.getElementById('results-count').textContent=f.length+' character'+(f.length===1?'':'s');
}

async function loadSettings(){
  showLoading();
  var q=_sb.from('settings').select('id,name,locations,star_count,is_public,created_at,user_id').eq('is_public',true);
  if(_classId!=='all'&&_classes.length){
    var m=await _sb.from('class_members').select('user_id').eq('class_id',_classId);
    var ids=(m.data||[]).map(function(x){return x.user_id;});
    if(!ids.length){_allSettings=[];renderSettings([]);return;}
    q=q.in('user_id',ids);
  }
  var r=await q.order('created_at',{ascending:false});
  if(r.error){showError(r.error.message);return;}
  if(!r.data||!r.data.length){_allSettings=[];renderSettings([]);return;}
  var uids=[...new Set(r.data.map(function(s){return s.user_id;}))];
  var pr=await _sb.from('profiles').select('id,display_name,username').in('id',uids);
  var pm={};(pr.data||[]).forEach(function(p){pm[p.id]=p;});
  _allSettings=r.data.map(function(s){s.profiles=pm[s.user_id]||null;return s;});
  applySettingFilters();
}
function applySettingFilters(){
  var q=document.getElementById('search-input').value.toLowerCase().trim();
  var f=_allSettings.filter(function(s){
    if(!q)return true;
    return(s.name||'').toLowerCase().includes(q)||((s.profiles&&(s.profiles.display_name||s.profiles.username))||'').toLowerCase().includes(q);
  });
  if(_sortBy==='stars')f.sort(function(a,b){return(b.star_count||0)-(a.star_count||0);});
  else f.sort(function(a,b){return new Date(b.created_at)-new Date(a.created_at);});
  _renderedItems=f;renderSettings(f);
  document.getElementById('results-count').textContent=f.length+' setting'+(f.length===1?'':'s');
}

var GRADS=['linear-gradient(135deg,#3A1A6A,#6A2A9A)','linear-gradient(135deg,#1A3A6A,#2A6A9A)','linear-gradient(135deg,#1A5A3A,#2A9A6A)','linear-gradient(135deg,#5A1A3A,#9A2A6A)','linear-gradient(135deg,#3A3A1A,#7A7A2A)'];
function renderChars(chars){
  var grid=document.getElementById('char-grid');
  if(!chars.length){grid.innerHTML='<div class="state-box"><svg viewBox="0 0 64 64" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="1.5" width="52" height="52" style="display:block;margin:0 auto;"><circle cx="32" cy="22" r="14"/><path d="M8 56c0-13 9-20 24-20s24 7 24 20"/></svg><h3>NO CHARACTERS YET</h3><p>Be the first to create and share one!</p></div>';return;}
  grid.innerHTML=chars.map(function(c,i){
    var img=c.ai_art_url||c.sketch_url;var auth=c.profiles?(c.profiles.display_name||c.profiles.username||'?'):'?';
    var starred=_starredIds.has(c.id);var bg=GRADS[i%GRADS.length];var init=(c.name||'?')[0].toUpperCase();
    var tags=[];if(c.personality)tags.push(c.personality.split(',')[0].trim());if(c.features)tags.push(c.features.split(',')[0].trim());
    return'<div class="zine-card" onclick="openModal('+i+')">'
      +'<div class="card-img" style="background:'+bg+';">'+(img?'<img src="'+escHtml(img)+'" alt=""/>':'<div class="card-initial">'+init+'</div>')+'<div class="card-star-badge">⭐ '+(c.star_count||0)+'</div></div>'
      +'<div class="card-body"><div class="card-name">'+escHtml(c.name||'Unnamed')+'</div><div class="card-by">by '+escHtml(auth)+'</div>'
      +(tags.length?'<div class="card-tags">'+tags.slice(0,2).map(function(t){return'<span class="card-tag">'+escHtml(t)+'</span>';}).join('')+'</div>':'')
      +'<button class="star-btn'+(starred?' starred':'') +'" onclick="event.stopPropagation();toggleStar(\''+c.id+'\',this)">'+(starred?'⭐ Starred':'☆ Star')+'</button></div></div>';
  }).join('');
}
function renderSettings(sets){
  var grid=document.getElementById('char-grid');
  if(!sets.length){grid.innerHTML='<div class="state-box"><svg viewBox="0 0 64 64" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="1.5" width="52" height="52" style="display:block;margin:0 auto;"><rect x="8" y="10" width="48" height="44" rx="6"/><path d="M8 22h48"/><circle cx="22" cy="36" r="5"/><path d="M30 36h16"/></svg><h3>NO SETTINGS YET</h3><p>Be the first to create and share one!</p></div>';return;}
  grid.innerHTML=sets.map(function(s,i){
    var locs=Array.isArray(s.locations)?s.locations:[];var fi=locs[0]&&locs[0].imageDataUrl?locs[0].imageDataUrl:null;
    var auth=s.profiles?(s.profiles.display_name||s.profiles.username||'?'):'?';var starred=_starredSettingIds.has(s.id);var bg=GRADS[i%GRADS.length];
    var locTags=locs.slice(0,2).map(function(l){return'<span class="card-tag">📍 '+escHtml(l.name||'')+'</span>';}).join('');
    return'<div class="zine-card set-card" onclick="openSettingModal('+i+')">'
      +'<div class="card-img" style="background:'+bg+';">'+(fi?'<img src="'+escHtml(fi)+'" alt=""/>':'<div class="card-initial" style="font-size:40px;">📍</div>')+'<div class="card-star-badge">⭐ '+(s.star_count||0)+'</div></div>'
      +'<div class="card-body"><div class="card-name">'+escHtml(s.name||'Untitled')+'</div><div class="card-by">by '+escHtml(auth)+' · '+locs.length+' loc'+(locs.length===1?'':'s')+'</div>'
      +(locTags?'<div class="card-tags">'+locTags+'</div>':'')
      +'<button class="star-btn'+(starred?' starred':'')+'" onclick="event.stopPropagation();toggleSettingStar(\''+s.id+'\',this)">'+(starred?'⭐ Starred':'☆ Star')+'</button></div></div>';
  }).join('');
}

function openModal(i){
  var c=_renderedItems[i];_activeItem=c;
  var auth=c.profiles?(c.profiles.display_name||c.profiles.username||'?'):'?';
  var img=c.ai_art_url||c.sketch_url;
  document.getElementById('m-name').textContent=c.name||'Unnamed';
  document.getElementById('m-by').textContent='by '+auth+' · '+(c.star_count||0)+' stars';
  var wrap=document.getElementById('m-img-wrap');var imgEl=document.getElementById('m-img');
  if(img){imgEl.src=img;wrap.style.display='block';}else{wrap.style.display='none';}
  var fields=[['Stand Out Features',c.features],['Height',c.height],['Build',c.build],['Character',c.personality],['Fears',c.fears],['Strengths',c.strengths],['Interests',c.interests],['Appearance',c.appearance]].filter(function(f){return f[1];});
  document.getElementById('m-fields').innerHTML=fields.map(function(f){return'<div class="modal-field"><div class="modal-field-label">'+f[0]+'</div><div class="modal-field-value">'+escHtml(f[1])+'</div></div>';}).join('')||'<div style="color:rgba(255,255,255,0.4);font-style:italic;font-size:13px;">No details filled in.</div>';
  var starred=_starredIds.has(c.id);
  document.getElementById('m-star-btn').className='modal-star-btn'+(starred?' starred':'');
  document.getElementById('m-star-label').textContent=starred?'Starred!':'Star this character';
  document.getElementById('m-star-btn').onclick=toggleStarModal;
  document.getElementById('char-modal').classList.add('open');
}
function openSettingModal(i){
  var s=_renderedItems[i];_activeItem=s;
  var auth=s.profiles?(s.profiles.display_name||s.profiles.username||'?'):'?';
  var locs=Array.isArray(s.locations)?s.locations:[];var fi=locs[0]&&locs[0].imageDataUrl?locs[0].imageDataUrl:null;
  document.getElementById('m-name').textContent=s.name||'Untitled';
  document.getElementById('m-by').textContent='by '+auth+' · '+locs.length+' locations · '+(s.star_count||0)+' stars';
  var wrap=document.getElementById('m-img-wrap');var imgEl=document.getElementById('m-img');
  if(fi){imgEl.src=fi;wrap.style.display='block';}else{wrap.style.display='none';}
  var sl={'see':'👁 See','hear':'👂 Hear','feelEmotion':'💜 Feel','touch':'✋ Touch','smell':'👃 Smell'};
  document.getElementById('m-fields').innerHTML=locs.map(function(loc){
    var senses=Object.entries(sl).filter(function(e){return loc[e[0]];}).map(function(e){return'<div class="modal-field"><div class="modal-field-label">'+e[1]+'</div><div class="modal-field-value">'+escHtml(loc[e[0]])+'</div></div>';}).join('');
    return'<div class="sense-section"><div class="sense-loc-name">📍 '+escHtml(loc.name||'Location')+'</div>'+senses+'</div>';
  }).join('');
  var starred=_starredSettingIds.has(s.id);
  document.getElementById('m-star-btn').className='modal-star-btn'+(starred?' starred':'');
  document.getElementById('m-star-label').textContent=starred?'Starred!':'Star this setting';
  document.getElementById('m-star-btn').onclick=toggleStarSettingModal;
  document.getElementById('char-modal').classList.add('open');
}
function closeModal(){document.getElementById('char-modal').classList.remove('open');_activeItem=null;}
function handleModalBgClick(e){if(e.target.id==='char-modal')closeModal();}

async function toggleStar(id,btn){
  if(!_user){showToast('Sign in to star!');return;}
  var starred=_starredIds.has(id);
  if(starred){_starredIds.delete(id);btn.className='star-btn';btn.textContent='☆ Star';await _sb.from('stars').delete().eq('user_id',_user.id).eq('character_id',id);showToast('Star removed');}
  else{_starredIds.add(id);btn.className='star-btn starred';btn.textContent='⭐ Starred';await _sb.from('stars').insert({user_id:_user.id,character_id:id});showToast('⭐ Starred!');}
}
async function toggleSettingStar(id,btn){
  if(!_user){showToast('Sign in to star!');return;}
  var starred=_starredSettingIds.has(id);
  if(starred){_starredSettingIds.delete(id);btn.className='star-btn';btn.textContent='☆ Star';await _sb.from('setting_stars').delete().eq('user_id',_user.id).eq('setting_id',id);showToast('Star removed');}
  else{_starredSettingIds.add(id);btn.className='star-btn starred';btn.textContent='⭐ Starred';await _sb.from('setting_stars').insert({user_id:_user.id,setting_id:id});showToast('⭐ Starred!');}
}
async function toggleStarModal(){if(_activeItem)await toggleStar(_activeItem.id,document.getElementById('m-star-btn'));var starred=_starredIds.has(_activeItem.id);document.getElementById('m-star-btn').className='modal-star-btn'+(starred?' starred':'');document.getElementById('m-star-label').textContent=starred?'Starred!':'Star this character';}
async function toggleStarSettingModal(){if(_activeItem)await toggleSettingStar(_activeItem.id,document.getElementById('m-star-btn'));var starred=_starredSettingIds.has(_activeItem.id);document.getElementById('m-star-btn').className='modal-star-btn'+(starred?' starred':'');document.getElementById('m-star-label').textContent=starred?'Starred!':'Star this setting';}

function showLoading(){document.getElementById('char-grid').innerHTML='<div class="state-box"><div class="spinner"></div></div>';}
function showError(msg){document.getElementById('char-grid').innerHTML='<div class="state-box"><h3>SOMETHING WENT WRONG</h3><p>'+escHtml(msg)+'</p></div>';}
function showToast(msg){var t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(function(){t.classList.remove('show');},2600);}
function escHtml(s){if(!s)return'';return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
document.addEventListener('keydown',function(e){if(e.key==='Escape')closeModal();});
init();
</script>
</body>
