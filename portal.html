<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Aurabot — Staff Portal</title>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@700;800;900&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --navy: #1A1D3A;
    --purple: #6C5CE7;
    --pink: #E84393;
    --lavender: #A29BFE;
    --light-bg: #EAE7FC;
    --white: #ffffff;
  }

  body {
    font-family: 'Nunito', sans-serif;
    background: var(--navy);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
  }

  /* Animated background blobs */
  .bg-blob {
    position: fixed;
    border-radius: 50%;
    filter: blur(80px);
    opacity: 0.15;
    animation: float 8s ease-in-out infinite;
  }
  .bg-blob-1 { width: 500px; height: 500px; background: var(--purple); top: -100px; left: -100px; animation-delay: 0s; }
  .bg-blob-2 { width: 400px; height: 400px; background: var(--pink); bottom: -80px; right: -80px; animation-delay: 3s; }
  .bg-blob-3 { width: 300px; height: 300px; background: var(--lavender); top: 50%; left: 50%; transform: translate(-50%,-50%); animation-delay: 1.5s; }

  @keyframes float {
    0%, 100% { transform: translateY(0) scale(1); }
    50% { transform: translateY(-30px) scale(1.05); }
  }
  .bg-blob-3 { animation-name: float3; }
  @keyframes float3 {
    0%, 100% { transform: translate(-50%,-50%) scale(1); }
    50% { transform: translate(-50%,-50%) scale(1.08); }
  }

  /* Star dots */
  .star { position: fixed; border-radius: 50%; background: white; animation: twinkle 3s ease-in-out infinite; }
  @keyframes twinkle { 0%,100%{opacity:0.2;} 50%{opacity:0.8;} }

  .portal-card {
    position: relative;
    z-index: 10;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(162,155,254,0.2);
    backdrop-filter: blur(20px);
    border-radius: 28px;
    padding: 48px 44px;
    width: 100%;
    max-width: 420px;
    box-shadow: 0 32px 80px rgba(0,0,0,0.4), 0 0 0 1px rgba(162,155,254,0.1);
    animation: slideUp 0.6s cubic-bezier(0.16,1,0.3,1);
  }

  @keyframes slideUp {
    from { opacity: 0; transform: translateY(30px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .logo-area {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    margin-bottom: 36px;
  }

  .logo-icon {
    width: 56px; height: 56px;
    background: linear-gradient(135deg, var(--purple), var(--pink));
    border-radius: 16px;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 8px 24px rgba(108,92,231,0.5);
    margin-bottom: 4px;
  }

  .logo-title {
    font-family: 'Baloo 2', cursive;
    font-size: 28px;
    font-weight: 900;
    color: white;
    letter-spacing: -0.5px;
  }

  .logo-sub {
    font-size: 11px;
    font-weight: 800;
    letter-spacing: 2.5px;
    text-transform: uppercase;
    color: var(--lavender);
  }

  .portal-heading {
    font-size: 13px;
    font-weight: 800;
    color: rgba(255,255,255,0.5);
    text-align: center;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    margin-bottom: 28px;
  }

  /* Role selector */
  .role-selector {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 24px;
  }

  .role-btn {
    background: rgba(255,255,255,0.05);
    border: 2px solid rgba(162,155,254,0.15);
    border-radius: 14px;
    padding: 14px 10px;
    cursor: pointer;
    text-align: center;
    transition: all 0.2s;
    color: rgba(255,255,255,0.5);
    font-family: 'Nunito', sans-serif;
  }

  .role-btn:hover {
    border-color: rgba(162,155,254,0.4);
    background: rgba(162,155,254,0.08);
    color: rgba(255,255,255,0.8);
  }

  .role-btn.selected {
    border-color: var(--purple);
    background: rgba(108,92,231,0.2);
    color: white;
    box-shadow: 0 0 0 3px rgba(108,92,231,0.2);
  }

  .role-icon { font-size: 24px; margin-bottom: 6px; }
  .role-label { font-size: 13px; font-weight: 800; display: block; }

  .input-wrap {
    position: relative;
    margin-bottom: 20px;
  }

  .input-wrap label {
    display: block;
    font-size: 11px;
    font-weight: 800;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--lavender);
    margin-bottom: 8px;
  }

  .input-wrap input {
    width: 100%;
    background: rgba(255,255,255,0.06);
    border: 2px solid rgba(162,155,254,0.2);
    border-radius: 12px;
    padding: 13px 16px;
    font-size: 15px;
    font-family: 'Nunito', sans-serif;
    color: white;
    transition: border-color 0.2s;
    outline: none;
  }

  .input-wrap input:focus {
    border-color: var(--purple);
    background: rgba(108,92,231,0.1);
  }

  .input-wrap input::placeholder { color: rgba(255,255,255,0.25); }

  .btn-login {
    width: 100%;
    padding: 15px;
    background: linear-gradient(135deg, var(--purple), #9B59B6);
    color: white;
    border: none;
    border-radius: 14px;
    font-size: 15px;
    font-weight: 800;
    font-family: 'Nunito', sans-serif;
    cursor: pointer;
    transition: all 0.2s;
    box-shadow: 0 4px 20px rgba(108,92,231,0.4);
    letter-spacing: 0.3px;
  }

  .btn-login:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 28px rgba(108,92,231,0.5);
  }

  .btn-login:active { transform: translateY(0); }

  .error-msg {
    display: none;
    background: rgba(232,67,147,0.15);
    border: 1px solid rgba(232,67,147,0.3);
    border-radius: 10px;
    padding: 10px 14px;
    font-size: 13px;
    font-weight: 700;
    color: #FF8AC5;
    text-align: center;
    margin-bottom: 16px;
  }

  .back-link {
    display: block;
    text-align: center;
    margin-top: 20px;
    font-size: 12px;
    font-weight: 700;
    color: rgba(162,155,254,0.6);
    text-decoration: none;
    transition: color 0.2s;
  }
  .back-link:hover { color: var(--lavender); }

  .shake { animation: shake 0.4s ease; }
  @keyframes shake {
    0%,100%{transform:translateX(0)}
    25%{transform:translateX(-8px)}
    75%{transform:translateX(8px)}
  }
</style>
</head>
<body>

<!-- Background blobs -->
<div class="bg-blob bg-blob-1"></div>
<div class="bg-blob bg-blob-2"></div>
<div class="bg-blob bg-blob-3"></div>

<!-- Twinkling stars -->
<script>
  for (let i = 0; i < 30; i++) {
    const s = document.createElement('div');
    s.className = 'star';
    const size = Math.random() * 3 + 1;
    s.style.cssText = `width:${size}px;height:${size}px;top:${Math.random()*100}%;left:${Math.random()*100}%;animation-delay:${Math.random()*4}s;animation-duration:${2+Math.random()*3}s;`;
    document.body.appendChild(s);
  }
</script>

<div class="portal-card">
  <div class="logo-area">
    <div class="logo-icon">
      <svg viewBox="0 0 32 32" fill="none" width="28" height="28">
        <rect x="6" y="10" width="20" height="16" rx="5" fill="#fff" opacity="0.95"/>
        <circle cx="12" cy="18" r="2.4" fill="#6C5CE7"/>
        <circle cx="20" cy="18" r="2.4" fill="#6C5CE7"/>
        <rect x="13" y="22" width="6" height="2" rx="1" fill="#E84393"/>
        <rect x="14" y="5" width="4" height="6" rx="2" fill="#A29BFE"/>
        <circle cx="16" cy="5" r="1.4" fill="#6C5CE7"/>
      </svg>
    </div>
    <div class="logo-title">Aurabot</div>
    <div class="logo-sub">Staff Portal</div>
  </div>

  <div class="portal-heading">Sign in as</div>

  <div class="role-selector" style="grid-template-columns:1fr 1fr 1fr;">
    <div class="role-btn" id="role-admin" onclick="selectRole('admin')">
      <div class="role-icon">🛡️</div>
      <span class="role-label">Admin</span>
    </div>
    <div class="role-btn" id="role-teacher" onclick="selectRole('teacher')">
      <div class="role-icon">🎓</div>
      <span class="role-label">Teacher</span>
    </div>
    <div class="role-btn" id="role-student" onclick="selectRole('student')">
      <div class="role-icon">🎒</div>
      <span class="role-label">Student</span>
    </div>
  </div>

  <!-- Admin / Teacher: password field -->
  <div id="staff-login">
    <div class="input-wrap">
      <label for="password">Password</label>
      <input type="password" id="password" placeholder="Enter your password" onkeydown="if(event.key==='Enter')doLogin()"/>
    </div>
  </div>

  <!-- Student: login code -->
  <div id="student-login" style="display:none;">
    <div class="input-wrap">
      <label for="student-code">Your Login Code</label>
      <input type="text" id="student-code" placeholder="e.g. AB3X7K" maxlength="6"
        style="text-transform:uppercase;letter-spacing:4px;font-size:18px;font-weight:900;text-align:center;"
        onkeydown="if(event.key==='Enter')doLogin()" oninput="this.value=this.value.toUpperCase()"/>
    </div>
    <p style="font-size:12px;font-weight:700;color:rgba(162,155,254,0.6);text-align:center;margin-top:-8px;margin-bottom:16px;">
      Your teacher will give you this code
    </p>
  </div>

  <div class="error-msg" id="error-msg"></div>

  <button class="btn-login" onclick="doLogin()" id="login-btn">Enter →</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  // ── SUPABASE (for student login) ──
  const SUPABASE_URL      = 'https://nwhaliuajvovesnrdfrr.supabase.co';
  const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im53aGFsaXVhanZvdmVzbnJkZnJyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk5MDUyMzEsImV4cCI6MjA5NTQ4MTIzMX0.cGZ_yqeTyQYyyUAIc1CrV-M6iwN34CtSzjYBF_nG9xE';
  const _sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  // ── ROLE PASSWORDS — change these to your preferred passwords ──
  const PASSWORDS = {
  admin:   'LDBBaura1007~',
  teacher: 'LDBBaura1007~'
};

  let selectedRole = null;

  function selectRole(role) {
    selectedRole = role;
    document.querySelectorAll('.role-btn').forEach(b => b.classList.remove('selected'));
    document.getElementById('role-' + role).classList.add('selected');

    // Show/hide the correct input
    document.getElementById('staff-login').style.display  = role === 'student' ? 'none' : 'block';
    document.getElementById('student-login').style.display = role === 'student' ? 'block' : 'none';
    document.getElementById('error-msg').style.display = 'none';

    // Focus the right field
    if (role === 'student') {
      document.getElementById('student-code').focus();
    } else {
      document.getElementById('password').focus();
    }

    // Update button label
    document.getElementById('login-btn').textContent = role === 'student' ? 'Enter Aurabot →' : 'Enter Portal →';
  }

  async function doLogin() {
    const errEl = document.getElementById('error-msg');
    const card  = document.querySelector('.portal-card');
    errEl.style.display = 'none';

    if (!selectedRole) {
      showError('Please select a role first.');
      return;
    }

    if (selectedRole === 'student') {
      await doStudentLogin();
    } else {
      doStaffLogin();
    }
  }

  // ── STAFF LOGIN (admin / teacher) ──
  function doStaffLogin() {
    const pw    = document.getElementById('password').value.trim();
    const errEl = document.getElementById('error-msg');
    const card  = document.querySelector('.portal-card');

    if (pw === PASSWORDS[selectedRole]) {
      sessionStorage.setItem('aurabot_role', selectedRole);
      sessionStorage.setItem('aurabot_auth', 'true');
      if (selectedRole === 'admin') {
        window.location.href = 'admin.html';
      } else {
        window.location.href = 'teacher.html';
      }
    } else {
      showError('Incorrect password. Please try again.');
      document.getElementById('password').value = '';
      shake(card);
    }
  }

  // ── STUDENT LOGIN (login code) ──
  async function doStudentLogin() {
    const code  = document.getElementById('student-code').value.trim().toUpperCase();
    const card  = document.querySelector('.portal-card');
    const btn   = document.getElementById('login-btn');

    if (!code || code.length < 4) {
      showError('Please enter your login code.');
      return;
    }

    // Look up student in teacher's local class data
    const teacherData = JSON.parse(localStorage.getItem('aurabot_teacher_data') || '{"classes":[]}');
    let foundStudent = null;
    let foundClass   = null;

    teacherData.classes.forEach(cls => {
      (cls.students || []).forEach(s => {
        if (s.code === code) { foundStudent = s; foundClass = cls; }
      });
    });

    if (!foundStudent) {
      showError("Code not recognised. Check your code and try again.");
      shake(card);
      return;
    }

    // Student found — sign them into Supabase using code-based credentials
    // Students sign in with: email = code@aurabot.app, password = code (simple, teacher-managed)
    btn.textContent = 'Signing in…';
    btn.disabled = true;

    const studentEmail    = code.toLowerCase() + '@aurabot.student';
    const studentPassword = code + '-' + (foundClass.id || 'aurabot');

    // Try sign in first; if that fails, create the account
    let { error } = await _sb.auth.signInWithPassword({ email: studentEmail, password: studentPassword });

    if (error && error.message.includes('Invalid login credentials')) {
      // First time — create Supabase account for this student
      const { error: signupError } = await _sb.auth.signUp({
        email: studentEmail,
        password: studentPassword,
        options: {
          data: {
            username: code,
            display_name: foundStudent.name,
            class_code: code
          },
          emailRedirectTo: null
        }
      });
      if (signupError && !signupError.message.includes('already registered')) {
        btn.textContent = 'Enter Aurabot →';
        btn.disabled = false;
        showError('Sign-in failed: ' + signupError.message);
        return;
      }
      // Sign in after signup
      const { error: signinError } = await _sb.auth.signInWithPassword({ email: studentEmail, password: studentPassword });
      if (signinError) {
        btn.textContent = 'Enter Aurabot →';
        btn.disabled = false;
        showError('Could not sign in. Try again in a moment.');
        return;
      }
    } else if (error) {
      btn.textContent = 'Enter Aurabot →';
      btn.disabled = false;
      showError('Sign-in error: ' + error.message);
      return;
    }

    // Signed in — store role and go to the character creator
    sessionStorage.setItem('aurabot_role', 'student');
    sessionStorage.setItem('aurabot_student_code', code);
    sessionStorage.setItem('aurabot_student_name', foundStudent.name);
    sessionStorage.setItem('aurabot_auth', 'true');
    window.location.href = 'index.html';
  }

  // ── HELPERS ──
  function showError(msg) {
    const el = document.getElementById('error-msg');
    el.textContent = msg;
    el.style.display = 'block';
  }

  function shake(el) {
    el.classList.remove('shake');
    void el.offsetWidth;
    el.classList.add('shake');
  }

  // Auto-select role from URL param
  const params = new URLSearchParams(window.location.search);
  if (params.get('role')) selectRole(params.get('role'));
</script>
</body>
</html>
