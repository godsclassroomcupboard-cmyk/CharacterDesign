# netlify.toml
# ─────────────────────────────────────────────────────────────
#  Aurabot — Netlify deployment configuration
# ─────────────────────────────────────────────────────────────

[build]
  publish = "."          # deploy from project root (single HTML file)
  command = ""           # no build step needed for vanilla HTML

# Redirect everything to index.html (SPA behaviour)
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200

# Security & performance headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options        = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy        = "strict-origin-when-cross-origin"
    Permissions-Policy     = "camera=(), microphone=()"

[[headers]]
  for = "*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
